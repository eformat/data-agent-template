domain:
  name: nndss
  display_name: "NNDSS Health Agent"
  description: "Australian disease surveillance agent with structured reasoning, Trino SQL data access, and full MLflow tracing."

data:
  trino_catalog: lakehouse
  trino_schema: nndss
  datasets:
    - name: influenza
      formal_name: "Influenza (laboratory confirmed)"
      category: respiratory
      years_available: "2008-2025"
      description: "Laboratory-confirmed influenza notifications"
      key_features:
        - "Largest NNDSS dataset (~100K+ notifications/year pre-COVID)"
        - "Laboratory-confirmed cases only (PCR, culture, DIF, serology)"
      limitations:
        - "PCR adoption (~2010) makes pre/post-2010 trends non-comparable"
        - "COVID-19 measures caused near-zero notifications in 2020-2021"
    - name: meningococcal
      formal_name: "Invasive meningococcal disease"
      category: vaccine-preventable
      years_available: "2009-2024"
      description: "Invasive meningococcal disease notifications"
      key_features:
        - "High case ascertainment (severe disease, most hospitalised)"
        - "Small numbers — state breakdowns may be unstable"
      limitations:
        - "Vaccination programs (MenC 2003, MenACWY 2018) affect trends"
    - name: pneumococcal
      formal_name: "Invasive pneumococcal disease"
      category: vaccine-preventable
      years_available: "2009-2024"
      description: "Invasive pneumococcal disease notifications"
      key_features:
        - "Vaccination program changes create natural experiments"
      limitations:
        - "Serotype replacement complicates trend interpretation"
        - "Invasive disease only, not all pneumonia"
    - name: salmonellosis
      formal_name: "Salmonellosis"
      category: foodborne
      years_available: "2009-2025"
      description: "Salmonellosis notifications"
      key_features:
        - "Most common notifiable foodborne disease in Australia"
        - "Strong seasonal pattern (peaks in warmer months)"
      limitations:
        - "Significant under-reporting (~7-10 community cases per notification)"

  methodology:
    influenza:
      collection_design: "Passive surveillance via NNDSS. Laboratory-confirmed influenza notifications reported by pathology labs and clinicians."
      case_definition: "Requires lab evidence: PCR, viral culture, DIF, or seroconversion."
      instruments: "PCR (predominant since ~2010), viral culture, DIF, serology"
      population_coverage: "All Australian residents. Depends on healthcare-seeking and testing."
      known_biases:
        - "Under-reporting: only tested cases captured"
        - "PCR adoption varied by state"
        - "COVID-19 2020-2021 near-zero"
        - "Reporting lag"
      geographic_resolution: "State/territory"
      temporal_resolution: "Monthly notification date"
      update_frequency: "Public datasets updated annually in July"
    meningococcal:
      collection_design: "Passive surveillance via NNDSS. Lab-confirmed and clinical cases."
      case_definition: "Confirmed: isolation of N. meningitidis from sterile site, or PCR detection."
      instruments: "Blood culture, CSF culture, PCR, gram stain"
      population_coverage: "All residents. High ascertainment due to severity."
      known_biases:
        - "Near-complete capture"
        - "Small numbers unstable"
        - "Vaccination programs affect trends"
      geographic_resolution: "State/territory"
      temporal_resolution: "Monthly notification date"
      update_frequency: "Public datasets updated annually in July"
    pneumococcal:
      collection_design: "Passive surveillance via NNDSS. Lab-confirmed invasive cases."
      case_definition: "Confirmed: isolation of S. pneumoniae from sterile site, or PCR."
      instruments: "Blood culture, CSF culture, PCR, urinary antigen"
      population_coverage: "All residents. Vaccination programs changed serotype distribution."
      known_biases:
        - "Vaccine serotype replacement"
        - "Non-bacteraemic pneumonia not captured"
      geographic_resolution: "State/territory"
      temporal_resolution: "Monthly notification date"
      update_frequency: "Public datasets updated annually in July"
    salmonellosis:
      collection_design: "Passive surveillance via NNDSS. Lab-confirmed cases."
      case_definition: "Confirmed: isolation of Salmonella spp (excl S. Typhi/Paratyphi)."
      instruments: "Stool culture, blood culture, MALDI-TOF, WGS"
      population_coverage: "All residents. Many mild cases never tested — estimated 7-10x under-reporting."
      known_biases:
        - "7-10x under-reporting"
        - "Seasonal peaks in warmer months"
        - "Outbreak clusters inflate counts"
      geographic_resolution: "State/territory"
      temporal_resolution: "Monthly notification date"
      update_frequency: "Public datasets updated annually in July"

  aliases:
    flu: influenza
    the flu: influenza
    meningitis: meningococcal
    imd: meningococcal
    ipd: pneumococcal
    salmonella: salmonellosis
    food poisoning: salmonellosis

  formal_names:
    influenza: "Influenza (laboratory confirmed)"
    meningococcal: "Invasive meningococcal disease"
    pneumococcal: "Invasive pneumococcal disease"
    salmonellosis: "Salmonellosis"

enrichment:
  geographic_resolution: "State/territory only, no LGA/postcode in public datasets"
  unsupported_conclusions:
    - "Causal claims about disease drivers"
    - "Individual-level risk assessment"
    - "Health advice or treatment recommendations"
  caveats:
    - "Notifications represent laboratory-confirmed cases only."
    - "State comparisons should account for population size differences."
    - "Under-reporting varies by disease (salmonellosis ~7-10x, meningococcal near-complete)."

mcp:
  query_tool_docstring: >
    Execute a read-only SQL query against the NNDSS Iceberg lakehouse in Trino.
    Tables: lakehouse.nndss.notifications (year, state, disease, notifications),
    lakehouse.nndss.population (year, state, population),
    lakehouse.nndss.fortnightly_notifications (year, period_start, period_end, disease_group, disease, state, notifications).
    Only SELECT queries allowed.
  query_result_methodology: "NNDSS passive surveillance — notifications from clinicians/labs. Counts reflect testing practices, not true incidence."
  dataset_source_name: "NNDSS Public Datasets"
  dataset_source_url: "https://www.cdc.gov.au/resources/collections/nndss-public-datasets"
  citation_source: "Australian National Notifiable Diseases Surveillance System (NNDSS)"
  citation_url: "https://www.cdc.gov.au/resources/collections/nndss-public-datasets"

mlflow:
  experiment_name: nndss-data-agent
  prompt_name: nndss-agent.system
  span_name: nndss_agent

starters:
  - label: "Available diseases"
    message: "What notifiable diseases do you have data for?"
  - label: "Influenza in NSW 2023"
    message: "How many influenza cases were notified in NSW in 2023?"
  - label: "Compare disease trends"
    message: "Compare influenza and pneumococcal disease trends over the past 5 years"
  - label: "Food poisoning in QLD"
    message: "What food poisoning cases were reported in Queensland last year?"
  - label: "Per-capita rates by state"
    message: "Which state had the highest influenza notification rate per 100,000 in 2023?"
  - label: "Latest COVID-19 fortnightly"
    message: "What are the latest fortnightly COVID-19 notifications by state?"

eval:
  seed_questions:
    - question: "How many influenza cases were notified in NSW in 2023?"
      expected_tools: [query_trino]
      expected_keywords: [notifications, laboratory-confirmed]
      question_type: data_retrieval
    - question: "Compare influenza and pneumococcal disease trends over the past 5 years"
      expected_tools: [query_trino]
      expected_keywords: [influenza, pneumococcal]
      question_type: cross_dataset
    - question: "Does vaccination cause the decline in pertussis notifications?"
      expected_tools: []
      expected_keywords: [cannot, causal]
      question_type: scope_boundary
      forbidden_content: ["yes, vaccination causes"]
    - question: "What are the influenza notifications in the Sydney LGA?"
      expected_tools: []
      expected_keywords: [state, territory]
      question_type: geographic_resolution
    - question: "How does NNDSS collect influenza data compared to sentinel surveillance?"
      expected_tools: [get_methodology]
      expected_keywords: [passive, surveillance]
      question_type: methodology_comparison

deployment:
  namespace: nndss
  model_name: kimi-k2-6
  model_endpoint: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/kimi-k2-6/v1
  trino_host: trino.trino.svc.cluster.local
  trino_port: 8443
  mlflow_tracking_uri: https://mlflow.redhat-ods-applications.svc:8443/mlflow
  mlflow_workspace: nndss
  s3_endpoint: http://minio.minio.svc.cluster.local:9000
  s3_bucket: nndss-data
  agent_resources:
    cpu_request: "200m"
    memory_request: "512Mi"
    cpu_limit: "1"
    memory_limit: "1Gi"
  mcp_resources:
    cpu_request: "100m"
    memory_request: "512Mi"
    cpu_limit: "500m"
    memory_limit: "1Gi"

system_prompt_file: system_prompt.md
