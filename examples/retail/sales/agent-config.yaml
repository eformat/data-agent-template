domain:
  name: retail-sales
  display_name: "Retail Sales Agent"
  description: "Sales department data agent for Acme Retail Corp. Hermes profile for sally. Provides access to orders, pipeline, customers, and acquisition cost data via a Trino Iceberg lakehouse."

data:
  trino_catalog: sales
  trino_schema: analytics
  datasets:
    - name: orders
      formal_name: "Sales Orders"
      category: transactional
      years_available: "2021-2025"
      description: "Individual order records with customer, region, product, and channel detail"
      key_features:
        - "Order-level granularity with customer linkage"
        - "Channel breakdown (retail, online, wholesale, marketplace)"
        - "Product line segmentation matching finance reporting"
      limitations:
        - "Returns not reflected — see Operations department for return data"
        - "B2B wholesale orders may have delayed recording"
        - "Order date is placement date, not delivery date"
    - name: pipeline
      formal_name: "Sales Pipeline"
      category: opportunity
      years_available: "2021-2025"
      description: "Sales opportunity records with stage progression and probability"
      key_features:
        - "Five-stage funnel (Prospect, Qualified, Proposal, Negotiation, Closed Won)"
        - "Probability-weighted expected revenue"
        - "Sales rep attribution"
      limitations:
        - "Stage progression is manual — reps update with varying discipline"
        - "Expected revenue is rep estimate, not model-based"
        - "Lost opportunities purged after 90 days"
    - name: customers
      formal_name: "Customer Master"
      category: reference
      years_available: "2021-2025"
      description: "Customer demographics, segmentation, and lifetime value"
      key_features:
        - "Four segments (Enterprise, Mid-Market, SMB, Consumer)"
        - "Lifetime value calculation updated quarterly"
        - "Acquisition channel tracking"
      limitations:
        - "Segment assignment is rule-based, not ML-driven"
        - "LTV is backward-looking (historical spend), not predictive"
        - "Duplicate customers possible across channels"
    - name: acquisition_costs
      formal_name: "Customer Acquisition Costs"
      category: financial
      years_available: "2021-2025"
      description: "Quarterly marketing spend and new customer counts by channel"
      key_features:
        - "CAC calculation by channel (spend / new customers)"
        - "Channel-level ROI tracking"
      limitations:
        - "Attribution is last-touch, not multi-touch"
        - "Organic customers attributed to 'direct' channel"
        - "Brand spend amortized evenly across quarters"

  methodology:
    orders:
      collection_design: "CRM system (Salesforce). Orders captured at point of sale or e-commerce checkout."
      case_definition: "A completed sales transaction with payment confirmed."
      instruments: "Salesforce Sales Cloud, POS integration, e-commerce order API"
      population_coverage: "All channels — 850+ retail stores, e-commerce, wholesale, marketplace."
      known_biases:
        - "Wholesale orders batched — may appear as single large orders"
        - "Marketplace orders have 48-hour recording delay"
        - "Returns not reflected in order data"
      geographic_resolution: "Region (5 regions)"
      temporal_resolution: "Daily (order date)"
      update_frequency: "Real-time sync from Salesforce, hourly batch for marketplace"
    pipeline:
      collection_design: "Salesforce opportunity records. Reps create and update opportunity stages manually."
      case_definition: "An active sales opportunity with identified customer and expected revenue."
      instruments: "Salesforce Opportunity object, lead scoring model (Einstein)"
      population_coverage: "B2B and Enterprise opportunities. Consumer retail excluded."
      known_biases:
        - "Stage updates are manual — pipeline hygiene varies by rep"
        - "Sandbagging (understating probability) common near quarter-end"
        - "Lost opportunities purged after 90 days"
      geographic_resolution: "Region (by sales rep territory)"
      temporal_resolution: "Created date and expected close date"
      update_frequency: "Real-time"
    customers:
      collection_design: "Customer master from Salesforce + e-commerce platform. Deduplicated quarterly."
      case_definition: "A unique customer entity with at least one completed purchase."
      instruments: "Salesforce Account/Contact, e-commerce customer DB, quarterly dedup job"
      population_coverage: "All customers with at least one purchase. Prospects excluded."
      known_biases:
        - "Cross-channel duplicates possible between dedup cycles"
        - "Segment rules favor revenue size — small frequent buyers may be mis-segmented"
        - "LTV calculation uses 3-year lookback"
      geographic_resolution: "Region"
      temporal_resolution: "Acquisition date"
      update_frequency: "Daily sync, quarterly dedup and LTV recalculation"
    acquisition_costs:
      collection_design: "Marketing spend from ad platforms + new customer counts from CRM."
      case_definition: "Quarterly spend and new customer count by acquisition channel."
      instruments: "Google Ads, Meta Ads, trade show budgets, Salesforce new customer reports"
      population_coverage: "All paid and tracked organic channels."
      known_biases:
        - "Last-touch attribution — overweights lower-funnel channels"
        - "Organic/direct attribution is a catch-all for untracked sources"
        - "Brand spend allocated evenly across quarters"
      geographic_resolution: "Channel (not regional)"
      temporal_resolution: "Quarterly"
      update_frequency: "Quarterly"

  aliases:
    purchases: orders
    transactions: orders
    sales: orders
    deals: pipeline
    opportunities: pipeline
    funnel: pipeline
    clients: customers
    accounts: customers
    buyers: customers
    cac: acquisition_costs
    marketing spend: acquisition_costs
    cost per acquisition: acquisition_costs

  formal_names:
    orders: "Sales Orders (Salesforce)"
    pipeline: "Sales Pipeline (Salesforce)"
    customers: "Customer Master (CRM)"
    acquisition_costs: "Customer Acquisition Costs (Marketing)"

enrichment:
  geographic_resolution: "Region-level (Northeast, Southeast, Midwest, West, International)"
  unsupported_conclusions:
    - "Individual customer PII or contact details"
    - "Predictive customer churn or future LTV"
    - "Multi-touch attribution (last-touch only)"
    - "Product-level inventory or fulfillment status (see Operations)"
    - "Revenue recognition or financial reporting (see Finance)"
  caveats:
    - "Order data reflects placement date, not delivery or payment date."
    - "Pipeline probability is rep-estimated, not statistically calibrated."
    - "Customer segments are rule-based, updated quarterly."
    - "Acquisition cost attribution uses last-touch model."

mcp:
  query_tool_docstring: >
    Execute a read-only SQL query against the Acme Retail Sales Iceberg lakehouse in Trino.
    Tables: sales.analytics.orders (order_id, order_date, customer_id, region, product_line, quantity, revenue_usd, channel),
    sales.analytics.pipeline (opportunity_id, stage, probability_pct, expected_revenue_usd, sales_rep, region, created_date, expected_close_date),
    sales.analytics.customers (customer_id, segment, region, acquisition_date, lifetime_value_usd, channel),
    sales.analytics.acquisition_costs (year, quarter, channel, spend_usd_k, new_customers, cac_usd).
    Only SELECT queries allowed.
  query_result_methodology: "CRM-sourced sales data — Salesforce sync, last-touch attribution. Pipeline stages are rep-managed."
  dataset_source_name: "Acme Retail Corp Sales Analytics"
  dataset_source_url: "https://internal.acme-retail.example.com/sales"
  citation_source: "Acme Retail Corp CRM (Salesforce)"
  citation_url: "https://internal.acme-retail.example.com/sales"

mlflow:
  experiment_name: retail-sales-agent
  prompt_name: retail-sales.system
  span_name: retail_sales_agent

starters:
  - label: "Top regions"
    message: "Which region had the highest order volume in 2024?"
  - label: "Pipeline health"
    message: "What does our current sales pipeline look like by stage?"
  - label: "Customer segments"
    message: "Break down our customer base by segment and average lifetime value"
  - label: "CAC by channel"
    message: "What is our customer acquisition cost by channel for 2024?"
  - label: "Online vs retail"
    message: "Compare online vs retail channel order volume over the last 3 years"

eval:
  seed_questions:
    - question: "Which region had the highest order volume in 2024?"
      expected_tools: [query_trino]
      expected_keywords: [orders, region]
      question_type: data_retrieval
    - question: "What does our current sales pipeline look like by stage?"
      expected_tools: [query_trino]
      expected_keywords: [pipeline, stage]
      question_type: data_retrieval
    - question: "Which customer will churn next?"
      expected_tools: []
      expected_keywords: [cannot, predictive]
      question_type: scope_boundary
      forbidden_content: ["will churn", "likely to leave"]
    - question: "What is our customer acquisition cost by channel?"
      expected_tools: [query_trino, get_methodology]
      expected_keywords: [CAC, channel, last-touch]
      question_type: cross_dataset

deployment:
  namespace: retail-sales
  model_name: kimi-k2-6
  model_endpoint: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/kimi-k2-6/v1
  trino_host: trino.trino.svc.cluster.local
  trino_port: 8443
  mlflow_tracking_uri: https://mlflow.redhat-ods-applications.svc:8443/mlflow
  mlflow_workspace: retail-sales
  s3_endpoint: http://minio.minio.svc.cluster.local:9000
  s3_bucket: retail-data

system_prompt_file: system_prompt.md
