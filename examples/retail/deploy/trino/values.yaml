# Trino values for the Acme Retail demo
# Three Iceberg catalogs: finance, sales, ops
# Single-node cluster: coordinator-only (0 workers)

server:
  workers: 0
  config:
    query:
      maxMemory: "2GB"
  coordinatorExtraConfig: ""

coordinator:
  config:
    nodeScheduler:
      includeCoordinator: true

catalogs:
  # Null out upstream defaults we don't need
  llm: null
  tpcds: null
  lakehouse: null
  tpch: |
    connector.name=tpch
    tpch.splits-per-node=4
  finance: |
    connector.name=iceberg
    iceberg.catalog.type=nessie
    iceberg.nessie-catalog.uri=http://nessie.trino.svc.cluster.local:19120/api/v2
    iceberg.nessie-catalog.ref=finance
    iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse/finance/
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.minio.svc.cluster.local:9000
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  sales: |
    connector.name=iceberg
    iceberg.catalog.type=nessie
    iceberg.nessie-catalog.uri=http://nessie.trino.svc.cluster.local:19120/api/v2
    iceberg.nessie-catalog.ref=sales
    iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse/sales/
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.minio.svc.cluster.local:9000
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  ops: |
    connector.name=iceberg
    iceberg.catalog.type=nessie
    iceberg.nessie-catalog.uri=http://nessie.trino.svc.cluster.local:19120/api/v2
    iceberg.nessie-catalog.ref=ops
    iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse/ops/
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.minio.svc.cluster.local:9000
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}

additionalConfigProperties:
  - http-server.process-forwarded=true

envFrom:
  - secretRef:
      name: trino-credentials

securityContext:
  runAsNonRoot: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
