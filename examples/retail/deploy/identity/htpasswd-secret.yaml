---
# HTPasswd secret for the Acme Retail demo users.
#
# Passwords (all demo/dev — rotate for any non-ephemeral cluster):
#   admin:           admin123
#   finance-analyst: finance123
#   sales-rep:       sales123
#   ops-manager:     ops123
#
# Generate with:
#   htpasswd -c -B -b users.htpasswd admin admin123
#   htpasswd -B -b users.htpasswd finance-analyst finance123
#   htpasswd -B -b users.htpasswd sales-rep sales123
#   htpasswd -B -b users.htpasswd ops-manager ops123
#
# Apply with:
#   oc create secret generic retail-htpasswd -n openshift-config --from-file=htpasswd=users.htpasswd
#
# Then patch the OAuth config (see oauth-patch.yaml).

apiVersion: v1
kind: Secret
metadata:
  name: retail-htpasswd
  namespace: openshift-config
type: Opaque
stringData:
  htpasswd: |
    admin:$2y$05$placeholder_generate_with_htpasswd_command
    finance-analyst:$2y$05$placeholder_generate_with_htpasswd_command
    sales-rep:$2y$05$placeholder_generate_with_htpasswd_command
    ops-manager:$2y$05$placeholder_generate_with_htpasswd_command
