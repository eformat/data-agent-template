# Patch the cluster OAuth to add the retail-htpasswd identity provider.
#
# Apply with:
#   oc patch oauth cluster --type=merge --patch-file=oauth-patch.yaml
#
# This adds the retail-htpasswd provider alongside any existing providers.
# Existing providers (e.g., LDAP, OIDC) are not affected.

apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: retail-demo
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: retail-htpasswd
