---
# OAuth proxy for Hermes sandbox dashboard
#
# Flow: Browser → Route → OAuth Proxy → OpenShell Gateway → Sandbox → Hermes Dashboard
#
# The OAuth proxy forwards the browser's Host header (retail-hermes.apps.*)
# to the OpenShell gateway, which matches it against the *.apps.* wildcard
# in server_sans and routes to the sandbox's service port.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-hermes-oauth
  namespace: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-hermes-oauth
  template:
    metadata:
      labels:
        app: retail-hermes-oauth
    spec:
      serviceAccountName: openshell-sandbox
      containers:
        - name: oauth-proxy
          image: image-registry.openshift-image-registry.svc:5000/openshift/oauth-proxy:v4.4
          args:
            - --provider=openshift
            - --pass-basic-auth=false
            - --pass-host-header=true
            - --https-address=:8443
            - --http-address=
            - --email-domain=*
            - --upstream=https://openshell.openshell.svc.cluster.local:8080
            - --upstream-ca=/etc/openshell-ca/ca.crt
            - --openshift-service-account=openshell-sandbox
            - --tls-key=/etc/tls/private/tls.key
            - --tls-cert=/etc/tls/private/tls.crt
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --openshift-ca=/etc/pki/tls/cert.pem
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - --openshift-sar={"namespace":"openshell","resource":"services","verb":"get"}
          ports:
            - containerPort: 8443
              name: oauth
          volumeMounts:
            - name: oauth-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: oauth-session
              mountPath: /etc/proxy/secrets
              readOnly: true
            - name: openshell-ca
              mountPath: /etc/openshell-ca
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: oauth-tls
          secret:
            secretName: retail-hermes-oauth-tls
        - name: oauth-session
          secret:
            secretName: retail-hermes-proxy-session
        - name: openshell-ca
          configMap:
            name: openshell-backend-ca
---
apiVersion: v1
kind: Service
metadata:
  name: retail-hermes-oauth
  namespace: openshell
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: retail-hermes-oauth-tls
spec:
  selector:
    app: retail-hermes-oauth
  ports:
    - name: oauth
      port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: retail-hermes
  namespace: openshell
spec:
  host: retail-hermes.apps.prelude-m6wl4-vs9lb.sandbox1832.opentlc.com
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  port:
    targetPort: oauth
  to:
    kind: Service
    name: retail-hermes-oauth
