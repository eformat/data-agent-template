# Declarative patch: inject OPENAI_API_KEY from Kubernetes Secret into sandbox pod.
# Applied after openshell sandbox create (which doesn't support env vars natively).
# The Secret 'hermes-api-key' is created separately via sandbox.yaml.
- op: add
  path: /spec/podTemplate/spec/containers/0/env/-
  value:
    name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: hermes-api-key
        key: OPENAI_API_KEY
