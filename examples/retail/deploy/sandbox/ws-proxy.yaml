---
# WebSocket-capable reverse proxy for the OpenShell gateway.
# Required because the gateway advertises h2 in TLS ALPN, and
# WebSocket upgrade only works over HTTP/1.1. This proxy terminates
# TLS with HTTP/1.1 only, then re-connects to the gateway.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-proxy-config
  namespace: openshell
data:
  nginx.conf: |
    worker_processes 1;
    error_log /dev/stderr info;
    pid /tmp/nginx.pid;
    events { worker_connections 256; }
    http {
      access_log /dev/stdout;
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      server {
        listen 8443 ssl;
        ssl_certificate /etc/tls/tls.crt;
        ssl_certificate_key /etc/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        # NO http2 — force HTTP/1.1 so WebSocket upgrade works
        location / {
          proxy_pass https://openshell.openshell.svc.cluster.local:8080;
          proxy_ssl_verify off;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 600s;
          proxy_send_timeout 600s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-proxy
  namespace: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-proxy
  template:
    metadata:
      labels:
        app: ws-proxy
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-124:latest
          command: ["nginx", "-c", "/etc/nginx-conf/nginx.conf", "-g", "daemon off;"]
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: config
              mountPath: /etc/nginx-conf
            - name: tls
              mountPath: /etc/tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: ws-proxy-config
        - name: tls
          secret:
            secretName: ws-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: ws-proxy
  namespace: openshell
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: ws-proxy-tls
spec:
  selector:
    app: ws-proxy
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: retail-hermes
  namespace: openshell
spec:
  host: retail-hermes.apps.prelude-m6wl4-vs9lb.sandbox1832.opentlc.com
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  port:
    targetPort: https
  to:
    kind: Service
    name: ws-proxy
