---
# Hermes config: model, no MCP (profiles have their own)
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: openshell
data:
  config.yaml: |
    model:
      provider: custom
      model: qwen36-27b
      base_url: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/qwen36-27b/v1
      api_key: "${OPENAI_API_KEY}"
    mcp_servers: {}
  active_profile: retail-sales
---
# Retail profiles: per-department MCP server + SOUL.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-profiles
  namespace: openshell
data:
  retail-finance-config.yaml: |
    model:
      provider: custom
      model: qwen36-27b
      base_url: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/qwen36-27b/v1
      api_key: "${OPENAI_API_KEY}"
    mcp_servers:
      retail-finance:
        url: http://retail-finance-mcp.openshell.svc.cluster.local:9090/mcp
  retail-finance-profile.yaml: |
    description: "Finance data analyst for Acme Retail. User: fred."
  retail-finance-soul.md: |
    You are a finance data analyst for Acme Retail Corp.
    ALWAYS use the mcp_retail_finance_query_trino tool to answer data questions.
    Available tables: finance.analytics.revenue, finance.analytics.expenses, finance.analytics.margins, finance.analytics.forecasts.
    Call mcp_retail_finance_check_permission before querying. You CANNOT access sales or operations data.
  retail-sales-config.yaml: |
    model:
      provider: custom
      model: qwen36-27b
      base_url: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/qwen36-27b/v1
      api_key: "${OPENAI_API_KEY}"
    mcp_servers:
      retail-sales:
        url: http://retail-sales-mcp.openshell.svc.cluster.local:9090/mcp
  retail-sales-profile.yaml: |
    description: "Sales analytics specialist for Acme Retail. User: sally."
  retail-sales-soul.md: |
    You are a sales analytics specialist for Acme Retail Corp.
    ALWAYS use the mcp_retail_sales_query_trino tool to answer data questions.
    Available tables: sales.analytics.orders, sales.analytics.pipeline, sales.analytics.customers, sales.analytics.acquisition_costs.
    Call mcp_retail_sales_check_permission before querying. You CANNOT access finance or operations data.
  retail-ops-config.yaml: |
    model:
      provider: custom
      model: qwen36-27b
      base_url: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/qwen36-27b/v1
      api_key: "${OPENAI_API_KEY}"
    mcp_servers:
      retail-ops:
        url: http://retail-ops-mcp.openshell.svc.cluster.local:9090/mcp
  retail-ops-profile.yaml: |
    description: "Operations analytics specialist for Acme Retail. User: alex."
  retail-ops-soul.md: |
    You are an operations analytics specialist for Acme Retail Corp.
    ALWAYS use the mcp_retail_ops_query_trino tool to answer data questions.
    Available tables: ops.analytics.inventory, ops.analytics.shipments, ops.analytics.warehouses, ops.analytics.returns.
    Call mcp_retail_ops_check_permission before querying. You CANNOT access finance or sales data.
---
# API key
apiVersion: v1
kind: Secret
metadata:
  name: hermes-api-key
  namespace: openshell
stringData:
  OPENAI_API_KEY: ""  # oc patch secret hermes-api-key -n openshell -p '{"stringData":{"OPENAI_API_KEY":"sk-..."}}'
---
# OAuth proxy session secret
apiVersion: v1
kind: Secret
metadata:
  name: retail-hermes-proxy-session
  namespace: openshell
stringData:
  session_secret: "CHANGE_ME_TO_RANDOM_HEX"  # openssl rand -hex 32
---
# Service for OAuth proxy (generates serving cert via annotation)
apiVersion: v1
kind: Service
metadata:
  name: retail-hermes-oauth
  namespace: openshell
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: retail-hermes-oauth-tls
spec:
  selector:
    openshell.ai/sandbox-id: PLACEHOLDER
  ports:
    - name: oauth
      port: 8443
      targetPort: 8443
---
# Route with OAuth (reencrypt TLS)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: retail-hermes
  namespace: openshell
spec:
  host: retail-hermes.apps.prelude-m6wl4-vs9lb.sandbox1832.opentlc.com
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  port:
    targetPort: oauth
  to:
    kind: Service
    name: retail-hermes-oauth
