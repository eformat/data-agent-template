---
# Strategic merge patch to add AuthBridge sidecars to retail-finance-mcp.
# Pattern from zero-trust-agent-demo — manual sidecar injection.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-finance-mcp
  namespace: openshell
spec:
  template:
    metadata:
      labels:
        app: retail-finance-mcp
    spec:
      initContainers:
        - name: proxy-init
          image: ghcr.io/kagenti/kagenti-extensions/proxy-init:v0.6.0-alpha.9
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            runAsNonRoot: false
            runAsUser: 0
            seLinuxOptions:
              type: spc_t
          env:
            - name: PROXY_PORT
              value: "15123"
            - name: INBOUND_PROXY_PORT
              value: "15124"
            - name: PROXY_UID
              value: "1337"
            - name: OUTBOUND_PORTS_EXCLUDE
              value: "9090"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            limits:
              cpu: 10m
              memory: 10Mi
      containers:
        - name: mcp
          securityContext:
            seLinuxOptions:
              type: spc_t
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:nightly
          command: ["/spiffe-helper", "-config=/etc/spiffe-helper/helper.conf", "run"]
          securityContext:
            seLinuxOptions:
              type: spc_t
          volumeMounts:
            - name: authbridge-spiffe-helper-config
              mountPath: /etc/spiffe-helper
            - name: spire-agent-socket
              mountPath: /run/spire/agent-sockets
              readOnly: true
            - name: svid-output
              mountPath: /opt
        - name: client-registration
          image: ghcr.io/kagenti/kagenti-extensions/client-registration:v0.6.0-alpha.9
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for SPIFFE credentials..."
              while [ ! -f /opt/jwt_svid.token ]; do sleep 2; done
              echo "SPIFFE credentials ready!"
              JWT_PAYLOAD=$(cat /opt/jwt_svid.token | cut -d'.' -f2)
              CLIENT_ID=$(echo "$JWT_PAYLOAD"== | base64 -d 2>/dev/null | python -c "import sys,json; print(json.load(sys.stdin).get('sub',''))")
              echo "$CLIENT_ID" > /shared/client-id.txt
              echo "Client ID: $CLIENT_ID"
              echo "Starting client registration..."
              python client_registration.py
              echo "Client registration complete!"
              tail -f /dev/null
          securityContext:
            seLinuxOptions:
              type: spc_t
          env:
            - name: SPIRE_ENABLED
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: SPIRE_ENABLED}}
            - name: KEYCLOAK_URL
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_URL}}
            - name: KEYCLOAK_REALM
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_REALM}}
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_ADMIN_USERNAME}}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_ADMIN_PASSWORD}}
            - name: KEYCLOAK_TOKEN_EXCHANGE_ENABLED
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_TOKEN_EXCHANGE_ENABLED}}
            - name: KEYCLOAK_CLIENT_REGISTRATION_ENABLED
              valueFrom: {configMapKeyRef: {name: authbridge-environments, key: KEYCLOAK_CLIENT_REGISTRATION_ENABLED}}
            - name: CLIENT_NAME
              value: retail-finance-mcp
            - name: SECRET_FILE_PATH
              value: /shared/client-secret.txt
          volumeMounts:
            - name: shared-data
              mountPath: /shared
            - name: svid-output
              mountPath: /opt
        - name: envoy-proxy
          image: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:v0.6.0-alpha.9
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1337
            runAsGroup: 1337
            seLinuxOptions:
              type: spc_t
          ports:
            - containerPort: 15123
            - containerPort: 15124
            - containerPort: 9901
          env:
            - name: TOKEN_URL
              valueFrom: {secretKeyRef: {name: authbridge-proxy-config, key: TOKEN_URL}}
            - name: ISSUER
              valueFrom: {secretKeyRef: {name: authbridge-proxy-config, key: ISSUER}}
            - name: TARGET_AUDIENCE
              valueFrom: {secretKeyRef: {name: authbridge-proxy-config, key: TARGET_AUDIENCE}}
            - name: TARGET_SCOPES
              valueFrom: {secretKeyRef: {name: authbridge-proxy-config, key: TARGET_SCOPES}}
            - name: CLIENT_ID_FILE
              value: "/shared/client-id.txt"
            - name: CLIENT_SECRET_FILE
              value: "/shared/client-secret.txt"
            - name: ROUTES_CONFIG_PATH
              value: "/etc/authproxy/routes.yaml"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
            - name: authproxy-routes
              mountPath: /etc/authproxy
              readOnly: true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: shared-data
          emptyDir: {}
        - name: svid-output
          emptyDir: {}
        - name: spire-agent-socket
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: authbridge-spiffe-helper-config
          configMap:
            name: authbridge-spiffe-helper-config
        - name: authproxy-routes
          configMap:
            name: authproxy-routes
