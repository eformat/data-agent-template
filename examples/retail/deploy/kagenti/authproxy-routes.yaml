apiVersion: v1
kind: ConfigMap
metadata:
  name: authproxy-routes
  namespace: openshell
data:
  routes.yaml: |
    # AuthBridge token exchange routes (first-match-wins)

    # Passthrough: internal services that use service-to-service auth
    - host: "kubernetes**"
      action: passthrough
    - host: "169.254.169.254"
      action: passthrough

    # Passthrough: SpiceDB uses its own pre-shared key
    - host: "dev.spicedb**"
      action: passthrough

    # Passthrough: Trino uses its own auth
    - host: "trino**"
      action: passthrough

    # Catch-all: validate and exchange JWT for all other requests
    # The MCP server reads the exchanged JWT to extract user identity
    - host: "**"
      target_audience: "retail-mcp"
      token_scopes: "openid"
