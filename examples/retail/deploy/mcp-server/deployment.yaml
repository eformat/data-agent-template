---
# ─── Finance MCP Server (fred) ───────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-finance-config
  namespace: openshell
data:
  agent-config.yaml: |
    domain:
      name: retail-finance
      display_name: "Retail Finance Agent"
      description: "Finance department data agent for Acme Retail Corp"
    data:
      trino_catalog: finance
      trino_schema: analytics
      datasets:
        - name: revenue
          formal_name: "Monthly Revenue"
          category: financial
          years_available: "2021-2025"
          description: "Monthly revenue by region and product line"
        - name: expenses
          formal_name: "Monthly Expenses"
          category: financial
          years_available: "2021-2025"
          description: "Monthly departmental expenses by category"
        - name: margins
          formal_name: "Quarterly Gross Margins"
          category: financial
          years_available: "2021-2025"
          description: "Quarterly gross margin percentages by product line"
        - name: forecasts
          formal_name: "Quarterly Forecasts"
          category: financial
          years_available: "2021-2025"
          description: "Quarterly revenue targets vs actuals by region"
      aliases:
        income: revenue
        costs: expenses
        profit margin: margins
        budget: forecasts
    mcp:
      query_tool_docstring: >
        Execute a read-only SQL query against the Acme Retail Finance Iceberg lakehouse.
        Tables: finance.analytics.revenue (year, month, region, product_line, revenue_usd_k),
        finance.analytics.expenses (year, month, department, category, amount_usd_k),
        finance.analytics.margins (year, quarter, product_line, revenue_usd_k, cogs_usd_k, gross_margin_pct),
        finance.analytics.forecasts (year, quarter, region, target_usd_k, actual_usd_k, variance_pct).
        Only SELECT queries allowed.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-finance-mcp
  namespace: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-finance-mcp
  template:
    metadata:
      labels:
        app: retail-finance-mcp
    spec:
      containers:
        - name: mcp
          image: quay.io/eformat/retail-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
          env:
            - name: TRINO_QUERY_HOST
              value: trino.trino.svc.cluster.local
            - name: TRINO_QUERY_PORT
              value: "8080"
            - name: CURRENT_USER
              value: fred
            - name: SPICEDB_ENDPOINT
              value: dev.spicedb.svc.cluster.local:50051
            - name: SPICEDB_TOKEN
              value: averysecretpresharedkey
            - name: SPICEDB_INSECURE
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: retail-finance-config
---
apiVersion: v1
kind: Service
metadata:
  name: retail-finance-mcp
  namespace: openshell
spec:
  selector:
    app: retail-finance-mcp
  ports:
    - port: 9090
      targetPort: 9090
---
# ─── Sales MCP Server (sally) ────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-sales-config
  namespace: openshell
data:
  agent-config.yaml: |
    domain:
      name: retail-sales
      display_name: "Retail Sales Agent"
      description: "Sales department data agent for Acme Retail Corp"
    data:
      trino_catalog: sales
      trino_schema: analytics
      datasets:
        - name: orders
          formal_name: "Sales Orders"
          category: transactional
          years_available: "2021-2025"
          description: "Individual order records with customer, region, product, and channel detail"
        - name: pipeline
          formal_name: "Sales Pipeline"
          category: opportunity
          years_available: "2021-2025"
          description: "Sales opportunity records with stage progression and probability"
        - name: customers
          formal_name: "Customer Master"
          category: reference
          years_available: "2021-2025"
          description: "Customer demographics, segmentation, and lifetime value"
        - name: acquisition_costs
          formal_name: "Customer Acquisition Costs"
          category: financial
          years_available: "2021-2025"
          description: "Quarterly marketing spend and new customer counts by channel"
      aliases:
        purchases: orders
        deals: pipeline
        clients: customers
        cac: acquisition_costs
    mcp:
      query_tool_docstring: >
        Execute a read-only SQL query against the Acme Retail Sales Iceberg lakehouse.
        Tables: sales.analytics.orders (order_id, order_date, customer_id, region, product_line, quantity, revenue_usd, channel),
        sales.analytics.pipeline (opportunity_id, stage, probability_pct, expected_revenue_usd, sales_rep, region, created_date, expected_close_date),
        sales.analytics.customers (customer_id, segment, region, acquisition_date, lifetime_value_usd, channel),
        sales.analytics.acquisition_costs (year, quarter, channel, spend_usd_k, new_customers, cac_usd).
        Only SELECT queries allowed.
