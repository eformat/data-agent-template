{{- if .Values.retailAccess }}
{{- if .Values.retailAccess.enabled }}
# Grant retail department groups view access to the openshell namespace
# so they pass the OAuth proxy SAR check
{{- range .Values.retailAccess.groups }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ . }}-view
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "hermes.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
{{- end }}
