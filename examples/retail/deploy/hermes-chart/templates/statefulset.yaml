---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hermes.fullname" . }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "hermes.config-annotations" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hermes.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hermes.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: memory-init
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/bash
          args:
            - -c
            - |-
              set -x
              # --- Memory init ---
              if [ ! -r /opt/data/memories/MEMORY.md ]; then
                mkdir -p /opt/data/memories
                cat > /opt/data/memories/MEMORY.md << 'MEMEOF'
              Always load the `kubernetes-helm-config` skill whenever the topic involves Hermes Agent config.
              Use the retail-finance profile for fred (finance queries).
              Use the retail-sales profile for sally (sales queries).
              Use the retail-ops profile for alex (operations queries).
              MEMEOF
                chown -R 10000:10000 /opt/data/memories
              fi
              # --- Retail profiles ---
              for dept in finance sales ops; do
                PROFILE_DIR="/opt/data/profiles/retail-${dept}"
                if [ ! -d "$PROFILE_DIR" ]; then
                  mkdir -p "$PROFILE_DIR"
                  chown -R 10000:10000 "$PROFILE_DIR"
                fi
              done
              # Profile descriptions
              printf 'description: "Finance data analyst for Acme Retail. Queries revenue, expenses, margins, and forecasts. User: fred."\n' > /opt/data/profiles/retail-finance/profile.yaml
              printf 'description: "Sales analytics specialist for Acme Retail. Queries orders, pipeline, customers, and CAC. User: sally."\n' > /opt/data/profiles/retail-sales/profile.yaml
              printf 'description: "Operations analytics specialist for Acme Retail. Queries inventory, shipments, warehouses, and returns. User: alex."\n' > /opt/data/profiles/retail-ops/profile.yaml
              # Profile configs (model + per-department MCP server only — no inherited MCP)
              for dept in finance sales ops; do
                cat > "/opt/data/profiles/retail-${dept}/config.yaml" << PROFILECFG
              model:
                provider: {{ .Values.config.model.provider }}
                model: {{ .Values.config.model.model }}
                base_url: {{ .Values.config.model.base_url }}
                api_key: "\${OPENAI_API_KEY}"
              mcp_servers:
                retail-${dept}:
                  url: http://retail-${dept}-mcp.openshell.svc.cluster.local:9090/mcp
              PROFILECFG
              done
              # SOUL.md — department-specific agent persona (always overwritten on upgrade)
              cat > /opt/data/profiles/retail-finance/SOUL.md << 'SOULEOF'
              You are a finance data analyst for Acme Retail Corp.

              You have access to the finance data lakehouse via MCP tools. ALWAYS use the mcp_retail_finance_query_trino tool to answer data questions — never make up data or search local files.

              Available tables:
              - finance.analytics.revenue (year, month, region, product_line, revenue_usd_k)
              - finance.analytics.expenses (year, month, department, category, amount_usd_k)
              - finance.analytics.margins (year, quarter, product_line, revenue_usd_k, cogs_usd_k, gross_margin_pct)
              - finance.analytics.forecasts (year, quarter, region, target_usd_k, actual_usd_k, variance_pct)

              All monetary values are in USD thousands. Regions: Northeast, Southeast, Midwest, West, International. Product lines: Apparel, Electronics, Home, Grocery, Sporting.

              Call mcp_retail_finance_check_permission before querying to verify access.

              You CANNOT access sales, operations, or other department data. If asked, explain the user needs access granted via the Platform Auth console plugin.
              SOULEOF
              cat > /opt/data/profiles/retail-sales/SOUL.md << 'SOULEOF'
              You are a sales analytics specialist for Acme Retail Corp.

              You have access to the sales data lakehouse via MCP tools. ALWAYS use the mcp_retail_sales_query_trino tool to answer data questions — never make up data or search local files.

              Available tables:
              - sales.analytics.orders (order_id, order_date, customer_id, region, product_line, quantity, revenue_usd, channel)
              - sales.analytics.pipeline (opportunity_id, stage, probability_pct, expected_revenue_usd, sales_rep, region, created_date, expected_close_date)
              - sales.analytics.customers (customer_id, segment, region, acquisition_date, lifetime_value_usd, channel)
              - sales.analytics.acquisition_costs (year, quarter, channel, spend_usd_k, new_customers, cac_usd)

              Channels: retail, online, wholesale, marketplace. Segments: Enterprise, Mid-Market, SMB, Consumer.

              Call mcp_retail_sales_check_permission before querying to verify access.

              You CANNOT access finance, operations, or other department data. If asked, explain the user needs access granted via the Platform Auth console plugin.
              SOULEOF
              cat > /opt/data/profiles/retail-ops/SOUL.md << 'SOULEOF'
              You are an operations analytics specialist for Acme Retail Corp.

              You have access to the operations data lakehouse via MCP tools. ALWAYS use the mcp_retail_ops_query_trino tool to answer data questions — never make up data or search local files.

              Available tables:
              - ops.analytics.inventory (date, sku, warehouse, quantity_on_hand, reorder_point, days_of_supply)
              - ops.analytics.shipments (shipment_id, order_id, warehouse, carrier, ship_date, delivery_date, transit_days, status)
              - ops.analytics.warehouses (warehouse_id, region, year, month, capacity_pallets, utilization_pct, operating_cost_usd_k)
              - ops.analytics.returns (return_id, order_id, sku, return_date, reason, refund_usd)

              Warehouses: DC-Northeast, DC-Southeast, DC-Midwest, DC-West, DC-International. Carriers: FedEx, UPS, USPS.

              Call mcp_retail_ops_check_permission before querying to verify access.

              You CANNOT access finance, sales, or other department data. If asked, explain the user needs access granted via the Platform Auth console plugin.
              SOULEOF
              chown -R 10000:10000 /opt/data/profiles
              # --- Dashboard theme ---
              mkdir -p /opt/data/dashboard-themes
              chown 10000:10000 /opt/data/dashboard-themes
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            {{- range $name, $volume := .Values.persistence }}
            - name: {{ include "hermes.fullname" $ }}-{{ $name }}
              mountPath: {{ $volume.mountPath }}
            {{- end }}
            - name: config
              mountPath: /opt/config-skills
              readOnly: true
      {{- if .Values.injectServiceCA }}
        - name: ca-bundle-packer
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/bash
          args:
            - -c
            - |-
              set -x
              find /etc/ssl/certs -type f -o -type l -exec cp -P {} /etc/ssl/new-root/ \;
              update-ca-certificates --etccertsdir /etc/ssl/new-root
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: service-ca
              mountPath: /usr/local/share/ca-certificates
            - name: new-ca-root
              mountPath: /etc/ssl/new-root
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /init
          args:
            - /opt/hermes/docker/main-wrapper.sh
            - gateway
            - run
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "hermes.fullname" . }}-env
            {{- if .Values.secretEnv }}
            - secretRef:
                name: {{ include "hermes.fullname" . }}-env
            {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            {{- range $name, $port := .Values.ports }}
            - name: {{ $name }}
              containerPort: {{ $port.port }}
              protocol: {{ $port.protocol | default "TCP" }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $name, $volume := .Values.persistence }}
            - name: {{ include "hermes.fullname" $ }}-{{ $name }}
              mountPath: {{ $volume.mountPath }}
            {{- end }}
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: config
              mountPath: /opt/data/skills/devops/kubernetes-helm-config/SKILL.md
              subPath: SKILL.md
            {{- if .Values.soul }}
            - name: config
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
            {{- end }}
            {{- if .Values.dashboardTheme.enabled }}
            - name: config
              mountPath: /opt/data/dashboard-themes/redhat.yaml
              subPath: redhat-theme.yaml
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
            {{- if .Values.injectServiceCA }}
            - mountPath: /etc/ssl/certs
              name: new-ca-root
            {{- end }}
        {{- if .Values.oauth.enabled }}
        - name: oauth-proxy
          image: {{ .Values.oauth.image.registry }}/{{ .Values.oauth.image.repo }}:{{ .Values.oauth.image.tag }}
          args:
            - --provider=openshift
            - --pass-basic-auth=false
            - --https-address=:8443
            - --http-address=
            - --email-domain=*
            - --upstream=http://localhost:{{ (get .Values.ports .Values.service.backend).port }}
            - --openshift-service-account={{ include "hermes.serviceAccountName" . }}
            - --tls-key=/etc/tls/private/tls.key
            - --tls-cert=/etc/tls/private/tls.crt
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --openshift-ca=/etc/pki/tls/cert.pem
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - --openshift-ca=/etc/ocp-injected-certs/ca-bundle.crt
            - >
              --openshift-sar={{ tpl .Values.oauth.sarTemplate . }}
          ports:
            - containerPort: 8443
              name: oauth
          volumeMounts:
            - mountPath: /etc/tls/private
              name: proxy-svc-tls
            - mountPath: /etc/proxy/secrets
              name: proxy-session
            - mountPath: /etc/ocp-injected-certs
              name: proxy-ca
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir:
            medium: Memory
        - name: config
          configMap:
            name: {{ include "hermes.fullname" . }}-config
        {{- if .Values.injectServiceCA }}
        - name: service-ca
          configMap:
            name: {{ include "hermes.fullname" . }}-ocp-service-ca
        - name: new-ca-root
          emptyDir: {}
        {{- end }}
        {{- if .Values.oauth.enabled }}
        - name: proxy-svc-tls
          secret:
            secretName: {{ include "hermes.fullname" . }}-proxy-svc-tls
        - name: proxy-session
          secret:
            secretName: {{ include "hermes.fullname" . }}-proxy-session
        - name: proxy-ca
          configMap:
            name: {{ include "hermes.fullname" . }}-ocp-injected-certs
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.persistence }}
  volumeClaimTemplates:
    {{- range $name, $volume := . }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ include "hermes.fullname" $ }}-{{ $name }}
        annotations:
          helm.sh/resource-policy: keep
        labels:
          {{- include "hermes.labels" $ | nindent 10 }}
      spec:
        {{- with $volume.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ $volume.size }}
        accessModes:
          {{- toYaml $volume.accessModes | nindent 10 }}
        volumeMode: {{ $volume.volumeMode | default "Filesystem" }}
    {{- end }}
  {{- end }}
