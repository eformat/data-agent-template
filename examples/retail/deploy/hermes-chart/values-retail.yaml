# Retail demo overrides for the Hermes chart
# Usage: helm install hermes ./hermes-chart -n openshell -f ./hermes-chart/values-retail.yaml

config:
  dashboard:
    theme: redhat

  model:
    provider: custom
    model: kimi-k2-6
    base_url: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/kimi-k2-6/v1
    api_key: "${OPENAI_API_KEY}"

  mcp_servers: {}

secretEnv:
  OPENAI_API_KEY: ""  # Set via --set secretEnv.OPENAI_API_KEY=<key>

env:
  GATEWAY_ALLOW_ALL_USERS: "true"

persistence:
  data:
    size: 10Gi

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 200m
    memory: 500Mi

oauth:
  enabled: true
  sarTemplate: >
    {"namespace": "{{ .Release.Namespace }}", "resource": "services", "verb": "get"}

route:
  enabled: true
  tls:
    enabled: true

retailAccess:
  enabled: true
  groups:
    - finance-dept
    - sales-dept
    - ops-dept
    - retail-admins
