name: redhat
label: Red Hat
description: Red Hat brand — dark background with signature red accents and Red Hat typography

palette:
  background:
    hex: "#151515"
    alpha: 1
  midground:
    hex: "#D2D2D2"
    alpha: 1
  foreground:
    hex: "#FFFFFF"
    alpha: 0
  warmGlow: "rgba(238, 0, 0, 0.15)"
  noiseOpacity: 0.5

typography:
  fontSans: '"Red Hat Text", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif'
  fontMono: '"Red Hat Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace'
  fontDisplay: '"Red Hat Display", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Mono:wght@400;500;700&family=Red+Hat+Text:wght@400;500;600;700&display=swap"
  baseSize: "16px"
  lineHeight: "1.55"
  letterSpacing: "-0.01em"

layout:
  radius: "0.25rem"
  density: comfortable

colorOverrides:
  primary: "#EE0000"
  primaryForeground: "#FFFFFF"
  destructive: "#C9190B"
  destructiveForeground: "#FFFFFF"
  success: "#3E8635"
  warning: "#EC7A08"
  border: "#3C3F42"
  muted: "#212427"
  mutedForeground: "#A3A3A3"

terminalBackground: "#0C0C0C"
