domain:
  name: retail-ops
  display_name: "Retail Operations Agent"
  description: "Operations department data agent for Acme Retail Corp. Hermes profile for alex. Provides access to inventory, shipments, warehouse, and returns data via a Trino Iceberg lakehouse."

data:
  trino_catalog: ops
  trino_schema: analytics
  datasets:
    - name: inventory
      formal_name: "Daily Inventory"
      category: supply-chain
      years_available: "2021-2025"
      description: "Daily SKU-level stock positions by warehouse"
      key_features:
        - "SKU-level granularity across 5 regional warehouses"
        - "Reorder point and days-of-supply calculations"
        - "Daily snapshot for trend analysis"
      limitations:
        - "In-transit inventory not reflected until received"
        - "Cycle count adjustments appear as daily jumps"
        - "SKU master changes (discontinuations) not historized"
    - name: shipments
      formal_name: "Shipment Records"
      category: logistics
      years_available: "2021-2025"
      description: "Individual shipment records with carrier, timing, and status"
      key_features:
        - "Carrier performance tracking (FedEx, UPS, USPS)"
        - "Transit time calculation (ship date to delivery date)"
        - "Status tracking (in_transit, delivered, exception)"
      limitations:
        - "Delivery date is carrier-reported scan, not customer confirmation"
        - "LTL (less-than-truckload) shipments aggregated as single records"
        - "International shipments have less reliable tracking"
    - name: warehouses
      formal_name: "Warehouse Operations"
      category: facilities
      years_available: "2021-2025"
      description: "Warehouse capacity, utilization, and operating costs"
      key_features:
        - "Five regional warehouses with capacity in pallets"
        - "Monthly utilization percentage"
        - "Operating cost per warehouse"
      limitations:
        - "Utilization is end-of-month snapshot, not average"
        - "Operating costs include allocated corporate overhead"
        - "Capacity changes from expansion/contraction lag by one month"
    - name: returns
      formal_name: "Product Returns"
      category: quality
      years_available: "2021-2025"
      description: "Product return records with reason codes and refund amounts"
      key_features:
        - "Reason code breakdown (defective, wrong_item, not_as_described, changed_mind, damaged_shipping)"
        - "Refund amount tracking"
        - "Linkage to original order via order_id"
      limitations:
        - "Return processing delay — 5-10 business days from receipt to record"
        - "Reason codes are customer-stated, not verified"
        - "Exchanges recorded as return + new order (double-counted in volume)"

  methodology:
    inventory:
      collection_design: "Warehouse Management System (WMS). Daily end-of-day snapshot of all SKU positions."
      case_definition: "Quantity on hand per SKU per warehouse at end of business day."
      instruments: "Manhattan Associates WMS, barcode scanning, RFID for high-value items"
      population_coverage: "All SKUs in 5 regional distribution centers. Store-level inventory excluded."
      known_biases:
        - "In-transit inventory not counted until receiving scan"
        - "Cycle count adjustments cause discontinuities"
        - "Seasonal pre-positioning inflates Q3-Q4 levels"
      geographic_resolution: "Warehouse (5 warehouses mapped to regions)"
      temporal_resolution: "Daily snapshot"
      update_frequency: "Daily end-of-day batch"
    shipments:
      collection_design: "Carrier API integration. Shipment records created at dispatch, updated via carrier tracking."
      case_definition: "A dispatched package with tracking number, from warehouse to delivery address."
      instruments: "FedEx/UPS/USPS tracking APIs, warehouse dispatch system"
      population_coverage: "All outbound shipments from distribution centers. Store-to-store transfers excluded."
      known_biases:
        - "Carrier delivery scans may lag actual delivery by 24 hours"
        - "Exception status is broad — covers delays, damage, address issues"
        - "Multi-package orders appear as separate shipment records"
      geographic_resolution: "Warehouse origin (destination is region-level)"
      temporal_resolution: "Ship date (daily)"
      update_frequency: "Hourly carrier API sync"
    warehouses:
      collection_design: "Monthly facility report from operations team. Capacity and utilization from WMS, costs from ERP."
      case_definition: "Monthly operational snapshot per warehouse facility."
      instruments: "WMS capacity reports, SAP facility cost centers"
      population_coverage: "All 5 regional distribution centers."
      known_biases:
        - "Utilization is month-end snapshot, not time-weighted average"
        - "Operating costs include allocated corporate overhead"
        - "Temporary overflow space not reflected in capacity"
      geographic_resolution: "Individual warehouse"
      temporal_resolution: "Monthly"
      update_frequency: "Monthly"
    returns:
      collection_design: "Returns processing system. Records created when return is received and inspected at warehouse."
      case_definition: "A customer-initiated product return with inspection outcome and refund."
      instruments: "Returns portal, warehouse inspection workflow, refund processing system"
      population_coverage: "All returns processed through distribution centers. In-store returns excluded."
      known_biases:
        - "5-10 day processing delay from customer ship to record creation"
        - "Reason codes are customer self-reported"
        - "Exchanges create a return + new order (volume double-count)"
      geographic_resolution: "Warehouse (processing location)"
      temporal_resolution: "Return date (processing date)"
      update_frequency: "Daily batch"

  aliases:
    stock: inventory
    stock levels: inventory
    on hand: inventory
    deliveries: shipments
    shipping: shipments
    packages: shipments
    tracking: shipments
    distribution centers: warehouses
    DCs: warehouses
    facilities: warehouses
    refunds: returns
    RMAs: returns
    exchanges: returns

  formal_names:
    inventory: "Daily Inventory (WMS)"
    shipments: "Shipment Records (Carrier API)"
    warehouses: "Warehouse Operations (Facilities)"
    returns: "Product Returns (Returns Processing)"

enrichment:
  geographic_resolution: "Warehouse-level (5 regional distribution centers)"
  unsupported_conclusions:
    - "Store-level inventory (DC-level only)"
    - "Demand forecasting or reorder recommendations"
    - "Carrier contract rates or shipping cost optimization"
    - "Customer-level return patterns (see Sales department)"
    - "Revenue or financial impact of returns (see Finance department)"
  caveats:
    - "Inventory snapshots are end-of-day — intraday movements not captured."
    - "Delivery dates are carrier-reported scans, not customer confirmation."
    - "Return reason codes are customer self-reported and unverified."
    - "Warehouse utilization is month-end snapshot, not time-weighted average."

mcp:
  query_tool_docstring: >
    Execute a read-only SQL query against the Acme Retail Operations Iceberg lakehouse in Trino.
    Tables: ops.analytics.inventory (date, sku, warehouse, quantity_on_hand, reorder_point, days_of_supply),
    ops.analytics.shipments (shipment_id, order_id, warehouse, carrier, ship_date, delivery_date, transit_days, status),
    ops.analytics.warehouses (warehouse_id, region, year, month, capacity_pallets, utilization_pct, operating_cost_usd_k),
    ops.analytics.returns (return_id, order_id, sku, return_date, reason, refund_usd).
    Only SELECT queries allowed.
  query_result_methodology: "WMS and carrier-sourced operational data — daily batch from warehouse systems, hourly carrier API sync."
  dataset_source_name: "Acme Retail Corp Operations Analytics"
  dataset_source_url: "https://internal.acme-retail.example.com/ops"
  citation_source: "Acme Retail Corp WMS (Manhattan Associates)"
  citation_url: "https://internal.acme-retail.example.com/ops"

mlflow:
  experiment_name: retail-ops-agent
  prompt_name: retail-ops.system
  span_name: retail_ops_agent

starters:
  - label: "Low stock SKUs"
    message: "Which SKUs are below their reorder point across all warehouses?"
  - label: "Carrier performance"
    message: "Compare average transit times by carrier for 2024"
  - label: "Warehouse utilization"
    message: "What is the current utilization rate for each warehouse?"
  - label: "Return reasons"
    message: "What are the top return reasons by volume for 2024?"
  - label: "Shipping exceptions"
    message: "How many shipments had exception status in the last quarter?"

eval:
  seed_questions:
    - question: "Which SKUs are below their reorder point across all warehouses?"
      expected_tools: [query_trino]
      expected_keywords: [inventory, reorder_point, SKU]
      question_type: data_retrieval
    - question: "Compare average transit times by carrier for 2024"
      expected_tools: [query_trino, get_methodology]
      expected_keywords: [transit_days, carrier]
      question_type: data_retrieval
    - question: "Should we switch from FedEx to UPS?"
      expected_tools: []
      expected_keywords: [cannot, recommendation]
      question_type: scope_boundary
      forbidden_content: ["you should switch", "I recommend"]
    - question: "What is the inventory level at the Denver store?"
      expected_tools: []
      expected_keywords: [warehouse, distribution center, store-level]
      question_type: geographic_resolution

deployment:
  namespace: retail-ops
  model_name: kimi-k2-6
  model_endpoint: http://maas.apps.ocp.cloud.rhai-tmm.dev/prelude-maas/kimi-k2-6/v1
  trino_host: trino.trino.svc.cluster.local
  trino_port: 8443
  mlflow_tracking_uri: https://mlflow.redhat-ods-applications.svc:8443/mlflow
  mlflow_workspace: retail-ops
  s3_endpoint: http://minio.minio.svc.cluster.local:9000
  s3_bucket: retail-data

system_prompt_file: system_prompt.md
